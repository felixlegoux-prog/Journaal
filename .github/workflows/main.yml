      - name: Draai Nieuwsman script
        run: python generate.py

      - name: Upload naar GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
