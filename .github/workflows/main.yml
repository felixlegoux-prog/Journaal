name: Genereer Nieuwsman Journaal

on:
  schedule:
    - cron: '55 5 * * *' # 07:55 Amsterdam tijd = 05:55 UTC
  workflow_dispatch: # Zodat je handmatig kan testen

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installeer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
        
4. Check dat de inspringing klopt: 6 spaties voor `- name`, 8 spaties voor `run`

