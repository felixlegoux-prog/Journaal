name: Genereer Nieuwsman Journaal

on:
  schedule:
    - cron: '55 5 * * *' # 07:55 Amsterdam tijd = 05:55 UTC
  workflow_dispatch: # Zodat je handmatig kan testen

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installeer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Draai Nieuwsman script
        run: python generate.py

      - name: Upload naar GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
